<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lobby — {{ application_obj.job_id.job_title }}</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Outfit:wght@400;600;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f4f4ef;--surface:#eeeee9;--surface2:#e7e7e2;--ink:#111110;--ink2:#444440;
  --ink3:#777770;--ink4:#aaaaaa;--border:#d2d2cc;--green:#216321;--green-bg:#edf7ed;
  --radius:8px;--font-mono:'JetBrains Mono',monospace;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);
     min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.lobby-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;
            width:100%;max-width:560px;overflow:hidden}
.lobby-header{padding:28px 32px;border-bottom:1px solid var(--border);background:var(--surface2)}
.lobby-eyebrow{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--ink4);margin-bottom:6px}
.lobby-title{font-family:'Outfit',sans-serif;font-size:22px;font-weight:800;letter-spacing:-.4px}
.lobby-meta{font-size:13px;color:var(--ink3);margin-top:4px}
.lobby-body{padding:28px 32px}

/* Camera preview */
.preview-wrap{position:relative;background:#111;border-radius:var(--radius);overflow:hidden;
              aspect-ratio:16/9;margin-bottom:20px}
#previewVideo{width:100%;height:100%;object-fit:cover;display:block;transform:scaleX(-1)}
.preview-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
                 flex-direction:column;gap:8px;color:#fff;font-size:13px}
.preview-overlay.hidden{display:none}
.cam-off-icon{font-size:32px}

/* Controls row */
.controls{display:flex;gap:8px;margin-bottom:20px}
.ctrl-btn{flex:1;padding:10px;border:1px solid var(--border);background:var(--bg);
          border-radius:var(--radius);cursor:pointer;font-family:'DM Sans',sans-serif;
          font-size:12px;font-weight:600;color:var(--ink2);display:flex;align-items:center;
          justify-content:center;gap:6px;transition:all .12s}
.ctrl-btn:hover{border-color:var(--ink);background:var(--surface2)}
.ctrl-btn.off{border-color:#c0392b;color:#c0392b;background:#fff5f5}

/* Device info */
.device-row{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);
            padding:10px 14px;margin-bottom:20px;font-size:12px;color:var(--ink3)}
.device-row span{font-weight:600;color:var(--ink)}

/* Status */
.status-box{display:flex;align-items:center;gap:10px;padding:12px 16px;
            background:var(--green-bg);border:1px solid #b7dfb7;border-radius:var(--radius);
            font-size:13px;color:var(--green);margin-bottom:20px}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--green);
            animation:blink 1.5s ease infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* Actions */
.action-row{display:flex;gap:10px}
.btn{padding:11px 24px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;
     letter-spacing:.6px;text-transform:uppercase;cursor:pointer;border-radius:6px;
     transition:all .12s;border:1px solid;text-decoration:none;display:inline-flex;
     align-items:center;gap:7px;flex:1;justify-content:center}
.btn-enter{background:var(--ink);color:#fff;border-color:var(--ink)}
.btn-enter:hover{opacity:.82}
.btn-back{background:transparent;color:var(--ink2);border-color:var(--border)}
.btn-back:hover{border-color:var(--ink);background:var(--surface2)}

/* Copy link */
.link-row{margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}
.link-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink4);margin-bottom:6px}
.link-box{display:flex;gap:6px}
.link-input{flex:1;padding:8px 11px;border:1px solid var(--border);border-radius:4px;
            background:var(--bg);font-family:var(--font-mono);font-size:11px;color:var(--ink3);
            outline:none}
.copy-btn{padding:8px 14px;border:1px solid var(--border);background:var(--surface2);
          border-radius:4px;font-size:11px;font-weight:600;cursor:pointer;transition:all .12s;
          color:var(--ink2)}
.copy-btn:hover{border-color:var(--ink);color:var(--ink)}
</style>
</head>
<body>

<div class="lobby-card">
  <div class="lobby-header">
    <div class="lobby-title">{{ application_obj.job_id.job_title }}</div>
    <div class="lobby-meta">
      {{ application_obj.job_id.company_id.company_name }}
    </div>
  </div>

  <div class="lobby-body">

    <!-- Camera preview -->
    <div class="preview-wrap">
      <video id="previewVideo" autoplay muted playsinline></video>
      <div class="preview-overlay" id="previewOverlay">
        <div class="cam-off-icon">🎥</div>
        <div>Camera is off</div>
      </div>
    </div>

    <!-- Mic / Camera toggles -->
    <div class="controls">
      <button class="ctrl-btn" id="btnMicToggle" onclick="toggleMic()">🎤 Mic On</button>
      <button class="ctrl-btn" id="btnCamToggle" onclick="toggleCam()">📷 Camera On</button>
    </div>

    <!-- Device info -->
    <div class="device-row" id="deviceInfo">Detecting devices…</div>

    <!-- Ready status -->
    <div class="status-box">
      <div class="status-dot"></div>
      Ready to join — your connection looks good.
    </div>

    <!-- Enter button -->
    <div class="action-row">
      <a href="{% url 'room' application_obj.interview_room_id %}" class="btn btn-enter">Enter Room →</a>
      <a href="/" class="btn btn-back">← Back</a>
    </div>

    <!-- Copy room link (HR only) -->
    {% if is_hr %}
    <div class="link-row">
      <div class="link-label">Share this room link with candidate</div>
      <div class="link-box">
        <input class="link-input" id="roomLink" readonly
               value="{{ request.scheme }}://{{ request.get_host }}{% url 'lobby' application_obj.interview_room_id %}">
        <button class="copy-btn" onclick="copyLink()">Copy</button>
      </div>
    </div>
    {% endif %}

  </div>
</div>

<script>
let localStream = null;
let micOn = true, camOn = true;

async function initPreview() {
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
    document.getElementById('previewVideo').srcObject = localStream;
    document.getElementById('previewOverlay').classList.add('hidden');

    const devices = await navigator.mediaDevices.enumerateDevices();
    const cam = devices.find(d => d.kind === 'videoinput');
    const mic = devices.find(d => d.kind === 'audioinput');
    document.getElementById('deviceInfo').innerHTML =
      `🎥 <span>${cam?.label || 'Default camera'}</span> &nbsp;&nbsp; 🎤 <span>${mic?.label || 'Default mic'}</span>`;
  } catch (err) {
    document.getElementById('deviceInfo').textContent = '⚠ Could not access camera/mic: ' + err.message;
  }
}

function toggleMic() {
  if (!localStream) return;
  micOn = !micOn;
  localStream.getAudioTracks().forEach(t => t.enabled = micOn);
  const btn = document.getElementById('btnMicToggle');
  btn.textContent = micOn ? '🎤 Mic On' : '🔇 Mic Off';
  btn.classList.toggle('off', !micOn);
}

function toggleCam() {
  if (!localStream) return;
  camOn = !camOn;
  localStream.getVideoTracks().forEach(t => t.enabled = camOn);
  const btn = document.getElementById('btnCamToggle');
  btn.textContent = camOn ? '📷 Camera On' : '🚫 Camera Off';
  btn.classList.toggle('off', !camOn);
  document.getElementById('previewOverlay').classList.toggle('hidden', camOn);
}

function copyLink() {
  const input = document.getElementById('roomLink');
  input.select();
  navigator.clipboard.writeText(input.value).then(() => {
    document.querySelector('.copy-btn').textContent = 'Copied!';
    setTimeout(() => document.querySelector('.copy-btn').textContent = 'Copy', 2000);
  });
}

initPreview();
</script>
</body>
</html>
